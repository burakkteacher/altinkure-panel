<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altınküre Ortaokulu Panel</title>

<style>

body{
font-family: system-ui;
background: linear-gradient(180deg,#f7f8fb,#eef1f7);
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.header{
display:flex;
align-items:center;
gap:15px;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.logo{
width:60px;
height:60px;
border-radius:12px;
background:white;
border:1px solid #eee;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.logo img{
width:100%;
}

.title h1{
margin:0;
font-size:22px;
}

.title p{
margin:0;
color:#777;
font-size:13px;
}

.panel{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.panel h2{
margin-top:0;
}

.buttons{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
padding:14px 22px;
border-radius:12px;
text-decoration:none;
font-weight:700;
display:inline-block;
}

.manual{
background:linear-gradient(180deg,#e6c65c,#caa12e);
color:#222;
}

.auto{
background:linear-gradient(180deg,#3c82f6,#1e56d8);
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">
<img src="logo.png">
</div>

<div class="title">
<h1>Altınküre Ortaokulu</h1>
<p>Öğrenci Çalışma Programı Paneli</p>
</div>
</div>

<div class="panel">

<h2>Sistemler</h2>

<p>
Program sistemlerine buradan erişebilirsiniz.
</p>

<div class="buttons">

<a class="btn manual"
href="https://burakkteacher.github.io/altinkure-manuel-program/"
target="_blank">

Manuel Program Aç

</a>

<a class="btn auto"
href="https://burakkteacher.github.io/ogrenci-program/"
target="_blank">

Analizden Otomatik Program Aç

</a>

</div>

</div>

</div>

</body>
</html>
